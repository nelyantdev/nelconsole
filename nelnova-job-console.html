<!--
  JOB SEARCH CONSOLE — standalone single-file app
  =================================================
  Paste this whole file into a WordPress "Custom HTML" block, OR upload it to
  any static host (Netlify, Cloudflare Pages, GitHub Pages) and open the URL.
  On your phone: open the URL -> browser menu -> "Add to Home Screen".

  Works with NO backend: board search links, application tracker, filters,
  metrics, deadlines, freshness, dark mode. Data is saved in this browser
  (localStorage) — it is per-device, not synced across phone + laptop.

  AI features (live job search, fit score, cover letter) call YOUR Google
  Apps Script web app so your Gemini key never touches the browser. Open
  Settings, paste your web-app URL and token, and the AI buttons activate.
  (See the matching doPost in JobScannerBackend.gs.)

  Note: if WordPress strips <script> tags on your plan, host on a static
  site instead — that always works.
-->
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// ---------------- storage (real localStorage, per device) ----------------
const store = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (_) { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (_) {} },
};

// ---------------- config ----------------
const CLUSTERS = [
  { id: "c1", label: "Nursing faculty", blurb: "Assistant / adjunct / associate professor — nursing, graduate nursing, EBP, community health.",
    terms: ["assistant professor nursing","adjunct faculty nursing","associate professor nursing","graduate nursing faculty","community health nursing faculty"] },
  { id: "c2", label: "Health science faculty / research", blurb: "Assistant professor / adjunct, research faculty — health science, health education, health promotion.",
    terms: ["assistant professor health science","research faculty health education","health promotion faculty","adjunct health science"] },
  { id: "c3", label: "Leadership, research & analytics", blurb: "Program chair, assistant dean, research scientist, clinical research coordinator, health data analyst, academic program manager.",
    terms: ["nursing program chair","assistant dean nursing","research scientist health","clinical research coordinator","health data analyst","academic program manager"] },
];
const BOARDS = [
  { name: "HigherEdJobs", note: "Tenure-track & adjunct faculty", build: (k,l)=>`https://www.higheredjobs.com/search/advanced_action.cfm?Keyword=${encodeURIComponent(k)}`+(l?`&City=${encodeURIComponent(l)}`:"") },
  { name: "Inside Higher Ed", note: "Faculty & academic admin", build: (k,l)=>`https://careers.insidehighered.com/jobs/?keywords=${encodeURIComponent(k)}`+(l?`&location=${encodeURIComponent(l)}`:"") },
  { name: "Chronicle (Vitae)", note: "Higher-ed faculty & leadership", build: (k,l)=>`https://jobs.chronicle.com/jobs/?keywords=${encodeURIComponent(k)}`+(l?`&location=${encodeURIComponent(l)}`:"") },
  { name: "Indeed", note: "Broad — faculty, staff, remote", build: (k,l)=>`https://www.indeed.com/jobs?q=${encodeURIComponent(k)}&l=${encodeURIComponent(l||"Remote")}` },
  { name: "LinkedIn", note: "Networked roles & recruiters", build: (k,l)=>`https://www.linkedin.com/jobs/search/?keywords=${encodeURIComponent(k)}&location=${encodeURIComponent(l||"United States")}` },
  { name: "Google Jobs", note: "Aggregates most boards", build: (k,l)=>`https://www.google.com/search?q=${encodeURIComponent(k+" "+(l||"remote"))}&ibp=htl;jobs` },
  { name: "ZipRecruiter", note: "Staff & administrative", build: (k,l)=>`https://www.ziprecruiter.com/jobs-search?search=${encodeURIComponent(k)}&location=${encodeURIComponent(l||"")}` },
];
const CATEGORIES = ["Faculty","Adjunct","Staff","Administrative"];
const SCHEDULES = ["Full-time","Part-time","Per diem","Other"];
const LOC_TYPES = ["On-site","Remote","Hybrid","Not specified"];
const STATUSES = ["Saved","Drafting","Applied","Interview","Offer","Rejected","Withdrawn"];
const POSTED_WINDOWS = [{label:"Any time",days:0},{label:"Last 24 hours",days:1},{label:"Last 7 days",days:7},{label:"Last 14 days",days:14},{label:"Last 30 days",days:30}];
const DEFAULT_CV = "Nelson M. Bryant, PhD, MSN/MBA, CFNP — Assistant Professor & board-certified Family Nurse Practitioner, Phoenix AZ. PhD Health Sciences (Liberty 2024); MSN/FNP; BSN; MBA. Assistant Professor / NP Program Administrator (Midwestern); PhD methodologist & dissertation mentor (Liberty); Associate Professor of Nursing (Arizona College of Nursing). Accreditation (CCNE), AACN Essentials curriculum, DNP project chair. Research: mHealth/wearables, hypertension & asthma self-management, underserved & African-born immigrant populations, AI in nursing curricula. Skills: Python, SQL, R, Tableau, SPSS, Epic, Cerner, ICD-10. APRN AZ/WA/MN.";

const todayISO = () => new Date().toISOString().slice(0,10);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const validDate = (d) => /^\d{4}-\d{2}-\d{2}$/.test(d||"");
function daysBetween(a,b=todayISO()){ if(!a) return null; return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000); }
function freshness(d){ const x=daysBetween(d); if(x===null||x<0||x>7) return null; return Math.round(100-(x/7)*30); }
function deadlineState(dl){ if(!dl) return null; const d=daysBetween(todayISO(),dl); if(d<0) return {label:"Passed",tone:"rose"}; if(d===0) return {label:"Due today",tone:"rose"}; if(d<=3) return {label:d+"d left",tone:"amber"}; if(d<=14) return {label:d+"d left",tone:"teal"}; return {label:d+"d left",tone:"slate"}; }

// ---------------- backend (your Apps Script web app) ----------------
async function callBackend(settings, action, payload) {
  if (!settings.backendUrl) throw new Error("Set your Apps Script web-app URL in Settings to enable AI features.");
  // text/plain avoids a CORS preflight, which Apps Script can't answer.
  const res = await fetch(settings.backendUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, token: settings.token || "", ...payload }),
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch (_) { throw new Error("Backend returned an unexpected response."); }
  if (data.error) throw new Error(data.error);
  return data;
}

// ---------------- UI atoms ----------------
function Badge({ children, tone="slate" }) {
  const map = {
    emerald:"bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200",
    amber:"bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-200",
    rose:"bg-rose-100 text-rose-800 dark:bg-rose-900 dark:text-rose-200",
    teal:"bg-teal-100 text-teal-800 dark:bg-teal-900 dark:text-teal-200",
    slate:"bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200",
  };
  return <span className={"inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium "+map[tone]}>{children}</span>;
}
const inputCls = "rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 border-slate-300 bg-white text-slate-900 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100";

// ---------------- app ----------------
function App() {
  const [dark, setDark] = useState(() => store.get("jc:dark") ?? false);
  const [tab, setTab] = useState("find");
  const [jobs, setJobs] = useState(() => store.get("jc:jobs") || []);
  const [settings, setSettings] = useState(() => store.get("jc:settings") || { cv: DEFAULT_CV, email: "nbryant@nelyant.com", homeBase: "Arizona", backendUrl: "", token: "" });

  useEffect(()=>{ store.set("jc:jobs", jobs); }, [jobs]);
  useEffect(()=>{ store.set("jc:settings", settings); }, [settings]);
  useEffect(()=>{ store.set("jc:dark", dark); document.documentElement.classList.toggle("dark", dark); }, [dark]);

  const addJob = useCallback((j)=> setJobs(p=>[{...j,id:uid()},...p]), []);
  const updateJob = useCallback((id,patch)=> setJobs(p=>p.map(x=>x.id===id?{...x,...patch}:x)), []);
  const removeJob = useCallback((id)=> setJobs(p=>p.filter(x=>x.id!==id)), []);

  const tabs = [{id:"find",label:"Find"},{id:"tracker",label:`Tracker${jobs.length?` (${jobs.length})`:""}`},{id:"settings",label:"Settings"}];

  return (
    <div className="min-h-screen w-full bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
      <div className="mx-auto max-w-6xl px-4 pb-24 pt-5 sm:px-6">
        <header className="flex flex-col gap-4 border-b border-slate-200 pb-4 dark:border-slate-700 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <div className="flex items-center gap-2">
              <span className="inline-block h-3 w-3 rounded-sm bg-teal-600 dark:bg-teal-400"></span>
              <h1 className="text-xl font-semibold tracking-tight">Job Search Console</h1>
            </div>
            <p className="mt-1 text-sm text-slate-500 dark:text-slate-400">Faculty, research & health-science roles · Arizona + remote US</p>
          </div>
          <div className="flex items-center gap-2">
            <nav className="flex rounded-lg border border-slate-200 p-0.5 dark:border-slate-700">
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)} className={"rounded-md px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 "+(tab===t.id?"bg-teal-600 text-white":"text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800")}>{t.label}</button>
              ))}
            </nav>
            <button onClick={()=>setDark(d=>!d)} className="rounded-lg border border-slate-200 px-3 py-1.5 text-sm text-slate-700 hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-800">{dark?"Light":"Dark"}</button>
          </div>
        </header>

        {tab==="find" && <FindTab settings={settings} addJob={addJob} />}
        {tab==="tracker" && <TrackerTab jobs={jobs} settings={settings} updateJob={updateJob} removeJob={removeJob} addJob={addJob} />}
        {tab==="settings" && <SettingsTab settings={settings} setSettings={setSettings} jobs={jobs} />}
      </div>
    </div>
  );
}

// ---------------- Find ----------------
function FindTab({ settings, addJob }) {
  const [cid, setCid] = useState(CLUSTERS[0].id);
  const [term, setTerm] = useState(CLUSTERS[0].terms[0]);
  const [location, setLocation] = useState("Arizona");
  const [remote, setRemote] = useState(false);
  const cluster = CLUSTERS.find(c=>c.id===cid);
  const loc = remote ? "Remote" : location;
  const sub = "text-slate-500 dark:text-slate-400";
  const cardCls = "rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4 sm:p-5";

  return (
    <div className="mt-6 space-y-6">
      <div className={cardCls}>
        <h2 className="text-sm font-semibold uppercase tracking-wide">Target role groups</h2>
        <div className="mt-3 flex flex-wrap gap-2">
          {CLUSTERS.map(c=>(
            <button key={c.id} onClick={()=>{setCid(c.id);setTerm(c.terms[0]);}} className={"rounded-lg border px-3 py-1.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 "+(c.id===cid?"border-teal-600 bg-teal-600 text-white":"border-slate-300 text-slate-700 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-200 dark:hover:bg-slate-700")}>{c.label}</button>
          ))}
        </div>
        <p className={"mt-3 text-sm "+sub}>{cluster.blurb}</p>
        <div className="mt-4 flex flex-wrap gap-2">
          {cluster.terms.map(t=>(
            <button key={t} onClick={()=>setTerm(t)} className={"rounded-full border px-3 py-1 text-xs font-medium focus:outline-none focus:ring-2 focus:ring-teal-500 "+(t===term?"border-teal-300 bg-teal-50 text-teal-800 dark:border-teal-500 dark:bg-teal-900 dark:text-teal-100":"border-slate-300 text-slate-600 hover:bg-slate-100 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700")}>{t}</button>
          ))}
        </div>
        <div className="mt-5 grid grid-cols-1 gap-3 sm:grid-cols-3">
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Search term</span><input value={term} onChange={e=>setTerm(e.target.value)} className={inputCls}/></label>
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Location</span><input value={location} disabled={remote} onChange={e=>setLocation(e.target.value)} className={inputCls+" disabled:opacity-50"}/></label>
          <label className="flex items-end gap-2 text-sm"><input type="checkbox" checked={remote} onChange={e=>setRemote(e.target.checked)} className="h-4 w-4 accent-teal-600"/><span>Remote (any US state)</span></label>
        </div>
      </div>

      <LiveFeed settings={settings} cluster={cluster} location={location} remote={remote} addJob={addJob} />

      <div className={cardCls}>
        <h2 className="text-sm font-semibold uppercase tracking-wide">Open live results on official boards</h2>
        <p className={"mt-1 text-sm "+sub}>Each button opens that board's own live search for "<span className="font-medium">{term}</span>" in <span className="font-medium">{loc}</span>.</p>
        <div className="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
          {BOARDS.map(b=>(
            <a key={b.name} href={b.build(term, remote?"Remote":location)} target="_blank" rel="noopener noreferrer" className="flex flex-col rounded-lg border border-slate-300 p-3 hover:border-teal-500 hover:bg-teal-50 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">
              <span className="flex items-center justify-between text-sm font-semibold">{b.name}<span className="text-teal-600 dark:text-teal-400">↗</span></span>
              <span className={"mt-1 text-xs "+sub}>{b.note}</span>
            </a>
          ))}
        </div>
      </div>

      <JobForm addJob={addJob} prefillTitle={term} prefillLoc={remote?"Remote":location} prefillCat={cluster.id==="c3"?"Administrative":"Faculty"} />
    </div>
  );
}

function LiveFeed({ settings, cluster, location, remote, addJob }) {
  const [busy,setBusy]=useState(false); const [results,setResults]=useState([]); const [err,setErr]=useState("");
  const [ran,setRan]=useState(false); const [added,setAdded]=useState({}); const [open,setOpen]=useState({});
  const sub="text-slate-500 dark:text-slate-400";
  const where = remote ? "Remote (any US state)" : (location||"United States");

  const find = async ()=>{
    setBusy(true); setErr(""); setRan(true); setOpen({});
    try {
      const data = await callBackend(settings, "search", { terms: cluster.terms, location: where, cv: settings.cv });
      const jobs = (data.jobs||[]).filter(j=>j&&j.title&&j.url);
      if (!jobs.length) setErr("No current matches surfaced this time. Try another role group or location.");
      setResults(jobs);
    } catch(e){ setErr(e.message||"Live search failed."); } finally { setBusy(false); }
  };
  const track = (j,i)=>{
    const note=[j.applyInstructions?`How to apply: ${j.applyInstructions}`:"", j.source?`Source: ${j.source}`:""].filter(Boolean).join("\n");
    addJob({ title:j.title||"", org:j.org||"", url:j.url||"", location:j.location||where, locationType:j.locationType||"Not specified",
      category:j.category||"Faculty", schedule:j.schedule||"Full-time", tenureTrack:"Not specified", researchFocus:"", salaryMin:"", salaryMax:"",
      datePosted:validDate(j.datePosted)?j.datePosted:todayISO(), deadline:validDate(j.deadline)?j.deadline:"", status:"Saved",
      description:j.summary||"", notes:note, fitLevel:j.fitLevel||"", fitReason:j.fitReason||"" });
    setAdded(a=>({...a,[i]:true}));
  };

  return (
    <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4 sm:p-5">
      <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 className="text-sm font-semibold uppercase tracking-wide">Find jobs now · live</h2>
          <p className={"mt-1 text-sm "+sub}>On-demand web search for current <span className="font-medium">{cluster.label.toLowerCase()}</span> roles in <span className="font-medium">{where}</span> — with dates, overview, and how to apply, scored against your CV.</p>
        </div>
        <button onClick={find} disabled={busy} className="shrink-0 rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-teal-500">{busy?"Searching…":"Find jobs now"}</button>
      </div>
      {busy && <p className={"mt-4 text-sm "+sub}>Querying live listings and scoring fit — this can take 20-40 seconds.</p>}
      {err && !busy && <p className="mt-4 text-sm text-rose-500">{err}</p>}
      {results.length>0 && (
        <>
          <p className={"mt-4 text-xs "+sub}>Found via live web search. Click through to confirm each posting before applying.</p>
          <div className="mt-2 space-y-3">
            {results.map((j,i)=>{
              const fresh=freshness(j.datePosted); const dl=validDate(j.deadline)?deadlineState(j.deadline):null;
              const tone=j.fitLevel==="Strong"?"emerald":j.fitLevel==="Moderate"?"amber":j.fitLevel==="Weak"?"rose":"slate";
              const hasDetail=j.summary||j.applyInstructions; const isOpen=open[i];
              return (
                <div key={i} className="rounded-lg border border-slate-200 p-3 dark:border-slate-700">
                  <div className="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
                    <div className="min-w-0">
                      <div className="flex flex-wrap items-center gap-2">
                        <span className="text-sm font-semibold">{j.title}</span>
                        {j.fitLevel && <Badge tone={tone}>{j.fitLevel} fit</Badge>}
                        {fresh!==null && <Badge tone="amber">Fresh {fresh}/100</Badge>}
                        {dl && <Badge tone={dl.tone}>Apply by {j.deadline} · {dl.label}</Badge>}
                      </div>
                      <p className={"mt-0.5 text-sm "+sub}>{j.org||"—"} · {j.location||where} · {j.locationType||"Not specified"}</p>
                      <p className={"mt-0.5 text-xs "+sub}>{validDate(j.datePosted)?`Posted ${j.datePosted}`:"Posted date not listed"}{validDate(j.deadline)?` · Apply by ${j.deadline}`:" · No close date listed"}</p>
                      {j.fitReason && <p className={"mt-1 text-xs italic "+sub}>{j.fitReason}</p>}
                      {hasDetail && <button onClick={()=>setOpen(o=>({...o,[i]:!o[i]}))} className="mt-1 text-xs font-medium text-teal-700 hover:text-teal-800 dark:text-teal-400 focus:outline-none">{isOpen?"Hide details":"Show overview & how to apply"}</button>}
                      {hasDetail && isOpen && (
                        <div className="mt-2 space-y-2 rounded-md border border-slate-200 bg-slate-50 p-2 text-xs dark:border-slate-700 dark:bg-slate-900">
                          {j.summary && <p><span className="font-semibold">Overview: </span><span className="text-slate-700 dark:text-slate-300">{j.summary}</span></p>}
                          {j.applyInstructions && <p><span className="font-semibold">How to apply: </span><span className="text-slate-700 dark:text-slate-300">{j.applyInstructions}</span></p>}
                          {j.source && <p className={sub}>Source: {j.source}</p>}
                        </div>
                      )}
                    </div>
                    <div className="flex shrink-0 gap-2">
                      <a href={j.url} target="_blank" rel="noopener noreferrer" className="rounded-lg border border-slate-300 px-2.5 py-1 text-xs font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Open ↗</a>
                      <button onClick={()=>track(j,i)} disabled={added[i]} className="rounded-lg bg-teal-600 px-2.5 py-1 text-xs font-semibold text-white hover:bg-teal-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-teal-500">{added[i]?"Tracked ✓":"Track"}</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
      {!ran && !busy && <p className={"mt-4 text-xs "+sub}>Pick a role group, set the location, then search live anytime. (Requires the Apps Script URL in Settings.)</p>}
    </div>
  );
}

// ---------------- Job form ----------------
function JobForm({ addJob, onDone, initial, prefillTitle="", prefillLoc="Arizona", prefillCat="Faculty" }) {
  const blank={title:prefillTitle,org:"",url:"",location:prefillLoc,locationType:"Not specified",category:prefillCat,schedule:"Full-time",tenureTrack:"Not specified",researchFocus:"",salaryMin:"",salaryMax:"",datePosted:todayISO(),deadline:"",status:"Saved",description:"",notes:""};
  const [form,setForm]=useState(initial||blank); const sub="text-slate-500 dark:text-slate-400";
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  const submit=()=>{ if(!form.title.trim())return; if(initial){onDone&&onDone(form);} else {addJob(form);setForm(blank);} };
  const F=({label,children})=>(<label className="flex flex-col gap-1 text-sm"><span className={sub}>{label}</span>{children}</label>);
  return (
    <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4 sm:p-5">
      <h2 className="text-sm font-semibold uppercase tracking-wide">{initial?"Edit role":"Track a role you found"}</h2>
      <p className={"mt-1 text-sm "+sub}>Paste the real listing URL so every saved link is verifiable.</p>
      <div className="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3">
        <F label="Job title"><input value={form.title} onChange={set("title")} className={inputCls}/></F>
        <F label="Organization"><input value={form.org} onChange={set("org")} className={inputCls}/></F>
        <F label="Listing URL"><input value={form.url} onChange={set("url")} placeholder="https://…" className={inputCls}/></F>
        <F label="Location"><input value={form.location} onChange={set("location")} className={inputCls}/></F>
        <F label="Location type"><select value={form.locationType} onChange={set("locationType")} className={inputCls}>{LOC_TYPES.map(x=><option key={x}>{x}</option>)}</select></F>
        <F label="Category"><select value={form.category} onChange={set("category")} className={inputCls}>{CATEGORIES.map(x=><option key={x}>{x}</option>)}</select></F>
        <F label="Schedule"><select value={form.schedule} onChange={set("schedule")} className={inputCls}>{SCHEDULES.map(x=><option key={x}>{x}</option>)}</select></F>
        <F label="Tenure-track"><select value={form.tenureTrack} onChange={set("tenureTrack")} className={inputCls}>{["Not specified","Tenure-track","Non-tenure-track"].map(x=><option key={x}>{x}</option>)}</select></F>
        <F label="Research focus"><input value={form.researchFocus} onChange={set("researchFocus")} className={inputCls}/></F>
        <F label="Salary min ($)"><input value={form.salaryMin} onChange={set("salaryMin")} inputMode="numeric" className={inputCls}/></F>
        <F label="Salary max ($)"><input value={form.salaryMax} onChange={set("salaryMax")} inputMode="numeric" className={inputCls}/></F>
        <F label="Date posted"><input type="date" value={form.datePosted} onChange={set("datePosted")} className={inputCls}/></F>
        <F label="Application deadline"><input type="date" value={form.deadline} onChange={set("deadline")} className={inputCls}/></F>
        <F label="Status"><select value={form.status} onChange={set("status")} className={inputCls}>{STATUSES.map(x=><option key={x}>{x}</option>)}</select></F>
      </div>
      <F label="Job description (paste for AI fit & tailoring)"><textarea value={form.description} onChange={set("description")} rows={3} className={"mt-1 "+inputCls}/></F>
      <div className="mt-4 flex gap-2">
        <button onClick={submit} className="rounded-lg bg-teal-600 px-4 py-2 text-sm font-semibold text-white hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500">{initial?"Save changes":"Add to tracker"}</button>
        {initial && onDone && <button onClick={()=>onDone(null)} className="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Cancel</button>}
      </div>
    </div>
  );
}

// ---------------- Tracker ----------------
function TrackerTab({ jobs, settings, updateJob, removeJob, addJob }) {
  const [f,setF]=useState({q:"",category:"",schedule:"",locationType:"",state:"",postedDays:0,tenure:"",status:"",research:"",salaryMin:""});
  const [editing,setEditing]=useState(null); const [aiFor,setAiFor]=useState(null);
  const sub="text-slate-500 dark:text-slate-400";
  const fc="rounded-lg border px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 border-slate-300 bg-white dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100";
  const setF1=k=>e=>setF(s=>({...s,[k]:e.target.value}));
  const filtered=useMemo(()=>jobs.filter(j=>{
    if(f.q&&!`${j.title} ${j.org} ${j.researchFocus}`.toLowerCase().includes(f.q.toLowerCase()))return false;
    if(f.category&&j.category!==f.category)return false; if(f.schedule&&j.schedule!==f.schedule)return false;
    if(f.locationType&&j.locationType!==f.locationType)return false;
    if(f.state&&!`${j.location}`.toLowerCase().includes(f.state.toLowerCase()))return false;
    if(f.tenure&&j.tenureTrack!==f.tenure)return false; if(f.status&&j.status!==f.status)return false;
    if(f.research&&!`${j.researchFocus}`.toLowerCase().includes(f.research.toLowerCase()))return false;
    if(f.salaryMin){const m=parseInt(j.salaryMax||j.salaryMin||"0",10); if(m&&m<parseInt(f.salaryMin,10))return false;}
    if(f.postedDays){const d=daysBetween(j.datePosted); if(d===null||d>f.postedDays)return false;}
    return true;
  }),[jobs,f]);
  const metrics=useMemo(()=>{const m={total:jobs.length,active:0,applied:0,interview:0,dueSoon:0,fresh:0};
    jobs.forEach(j=>{ if(!["Rejected","Withdrawn"].includes(j.status))m.active++; if(["Applied","Interview","Offer"].includes(j.status))m.applied++;
      if(["Interview","Offer"].includes(j.status))m.interview++; const dl=j.deadline?daysBetween(todayISO(),j.deadline):null;
      if(dl!==null&&dl>=0&&dl<=7)m.dueSoon++; if(freshness(j.datePosted)!==null)m.fresh++; }); return m; },[jobs]);

  if(!jobs.length) return <div className="mt-10 rounded-xl border border-dashed border-slate-300 p-10 text-center dark:border-slate-700"><p className="text-base font-medium">No roles tracked yet</p><p className={"mt-1 text-sm "+sub}>Use Find to search live or open a board, then add roles here.</p></div>;

  return (
    <div className="mt-6 space-y-5">
      <div className="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-6">
        {[["Tracked",metrics.total],["Active",metrics.active],["Applied",metrics.applied],["Interview+",metrics.interview],["Due ≤7d",metrics.dueSoon],["Fresh ≤7d",metrics.fresh]].map(([l,v])=>(
          <div key={l} className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-3"><div className="text-2xl font-semibold">{v}</div><div className={"text-xs "+sub}>{l}</div></div>
        ))}
      </div>
      <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-3 sm:p-4">
        <div className="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-4">
          <input placeholder="Search title / org" value={f.q} onChange={setF1("q")} className={fc}/>
          <input placeholder="State / city" value={f.state} onChange={setF1("state")} className={fc}/>
          <input placeholder="Research focus" value={f.research} onChange={setF1("research")} className={fc}/>
          <input placeholder="Min salary" inputMode="numeric" value={f.salaryMin} onChange={setF1("salaryMin")} className={fc}/>
          <select value={f.category} onChange={setF1("category")} className={fc}><option value="">Any category</option>{CATEGORIES.map(x=><option key={x}>{x}</option>)}</select>
          <select value={f.schedule} onChange={setF1("schedule")} className={fc}><option value="">Any schedule</option>{SCHEDULES.map(x=><option key={x}>{x}</option>)}</select>
          <select value={f.locationType} onChange={setF1("locationType")} className={fc}><option value="">Any location type</option>{LOC_TYPES.map(x=><option key={x}>{x}</option>)}</select>
          <select value={f.tenure} onChange={setF1("tenure")} className={fc}><option value="">Any track</option>{["Tenure-track","Non-tenure-track","Not specified"].map(x=><option key={x}>{x}</option>)}</select>
          <select value={f.status} onChange={setF1("status")} className={fc}><option value="">Any status</option>{STATUSES.map(x=><option key={x}>{x}</option>)}</select>
          <select value={f.postedDays} onChange={e=>setF(s=>({...s,postedDays:parseInt(e.target.value,10)}))} className={fc}>{POSTED_WINDOWS.map(w=><option key={w.label} value={w.days}>{w.label}</option>)}</select>
          <button onClick={()=>setF({q:"",category:"",schedule:"",locationType:"",state:"",postedDays:0,tenure:"",status:"",research:"",salaryMin:""})} className="rounded-lg border border-slate-300 px-2 py-1.5 text-sm font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Clear</button>
        </div>
        <p className={"mt-2 text-xs "+sub}>Showing {filtered.length} of {jobs.length}</p>
      </div>
      {editing && <JobForm initial={editing} addJob={addJob} onDone={patch=>{if(patch)updateJob(editing.id,patch);setEditing(null);}}/>}
      <div className="space-y-3">{filtered.map(j=><JobCard key={j.id} job={j} onEdit={()=>setEditing(j)} onDelete={()=>removeJob(j.id)} onStatus={s=>updateJob(j.id,{status:s})} onAI={()=>setAiFor(j)}/>)}</div>
      {aiFor && <AIPanel job={aiFor} settings={settings} onClose={()=>setAiFor(null)} onSaveFit={fit=>updateJob(aiFor.id,fit)} onSaveNote={t=>updateJob(aiFor.id,{notes:(aiFor.notes?aiFor.notes+"\n\n":"")+t})}/>}
    </div>
  );
}

function JobCard({ job, onEdit, onDelete, onStatus, onAI }) {
  const sub="text-slate-500 dark:text-slate-400"; const fresh=freshness(job.datePosted); const dl=deadlineState(job.deadline);
  const tone=job.fitLevel==="Strong"?"emerald":job.fitLevel==="Moderate"?"amber":job.fitLevel==="Weak"?"rose":"slate";
  return (
    <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4">
      <div className="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
        <div className="min-w-0">
          <div className="flex flex-wrap items-center gap-2">
            <h3 className="text-base font-semibold">{job.title}</h3>
            {fresh!==null && <Badge tone="amber">Fresh {fresh}/100</Badge>}
            {job.fitLevel && <Badge tone={tone}>{job.fitLevel} fit</Badge>}
            {job.tenureTrack==="Tenure-track" && <Badge tone="teal">Tenure-track</Badge>}
          </div>
          <p className={"mt-0.5 text-sm "+sub}>{job.org||"—"} · {job.location||"—"} · {job.locationType}</p>
          <div className={"mt-2 flex flex-wrap gap-x-4 gap-y-1 text-xs "+sub}>
            <span>{job.category} · {job.schedule}</span>
            {job.researchFocus && <span>Focus: {job.researchFocus}</span>}
            {(job.salaryMin||job.salaryMax) && <span>${job.salaryMin||"?"}–${job.salaryMax||"?"}</span>}
            {job.datePosted && <span>Posted {job.datePosted}</span>}
            {dl && <span className={dl.tone==="rose"?"font-semibold text-rose-500":""}>Deadline {job.deadline} · {dl.label}</span>}
          </div>
          {job.fitReason && <p className={"mt-2 text-xs italic "+sub}>{job.fitReason}</p>}
          {job.notes && <p className="mt-2 whitespace-pre-wrap text-xs text-slate-600 dark:text-slate-300">{job.notes}</p>}
        </div>
        <div className="flex shrink-0 flex-col gap-2 sm:items-end">
          <select value={job.status} onChange={e=>onStatus(e.target.value)} className="rounded-lg border border-slate-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100">{STATUSES.map(s=><option key={s}>{s}</option>)}</select>
          <div className="flex flex-wrap gap-2">
            {job.url && <a href={job.url} target="_blank" rel="noopener noreferrer" className="rounded-lg border border-slate-300 px-2.5 py-1 text-xs font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Open ↗</a>}
            <button onClick={onAI} className="rounded-lg bg-teal-600 px-2.5 py-1 text-xs font-semibold text-white hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500">AI assist</button>
            <button onClick={onEdit} className="rounded-lg border border-slate-300 px-2.5 py-1 text-xs font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Edit</button>
            <button onClick={onDelete} className="rounded-lg border border-slate-300 px-2.5 py-1 text-xs font-medium text-rose-600 hover:bg-rose-50 focus:outline-none focus:ring-2 focus:ring-rose-500 dark:border-slate-600 dark:text-rose-300 dark:hover:bg-slate-700">Remove</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AIPanel({ job, settings, onClose, onSaveFit, onSaveNote }) {
  const [busy,setBusy]=useState(false); const [mode,setMode]=useState(""); const [out,setOut]=useState(""); const [err,setErr]=useState("");
  const sub="text-slate-500 dark:text-slate-400";
  const jobText=`ROLE: ${job.title} at ${job.org||"(org)"} — ${job.location}, ${job.locationType}, ${job.category}, ${job.schedule}, ${job.tenureTrack}. Focus: ${job.researchFocus||"n/a"}.\nDESCRIPTION:\n${job.description||"(no description pasted)"}`;
  const run=async which=>{ setBusy(true);setMode(which);setOut("");setErr("");
    try {
      const data=await callBackend(settings, which, { cv: settings.cv, job: jobText });
      if(which==="fit"){ setOut(`${data.level} fit — ${data.reason}`); onSaveFit({fitLevel:data.level,fitReason:data.reason}); }
      else setOut(data.text||"");
    } catch(e){ setErr(e.message||"Request failed."); } finally { setBusy(false); }
  };
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bg-black bg-opacity-50 p-0 sm:items-center sm:p-4" onClick={onClose}>
      <div className="max-h-full w-full max-w-2xl overflow-y-auto rounded-t-2xl border bg-white border-slate-200 p-5 dark:bg-slate-800 dark:border-slate-700 sm:rounded-2xl" onClick={e=>e.stopPropagation()}>
        <div className="flex items-start justify-between">
          <div><h3 className="text-base font-semibold">AI assist · {job.title}</h3><p className={"mt-0.5 text-xs "+sub}>Runs on your Apps Script backend. Edit the role to paste the job description for sharper results.</p></div>
          <button onClick={onClose} className="rounded-lg px-2 py-1 text-sm hover:bg-slate-100 dark:hover:bg-slate-700">✕</button>
        </div>
        <div className="mt-4 flex flex-wrap gap-2">
          <button disabled={busy} onClick={()=>run("fit")} className="rounded-lg bg-teal-600 px-3 py-1.5 text-sm font-semibold text-white hover:bg-teal-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-teal-500">Analyze fit</button>
          <button disabled={busy} onClick={()=>run("resume")} className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium hover:bg-slate-100 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Tailor resume bullets</button>
          <button disabled={busy} onClick={()=>run("cover")} className="rounded-lg border border-slate-300 px-3 py-1.5 text-sm font-medium hover:bg-slate-100 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Draft cover letter</button>
        </div>
        <div className="mt-4">
          {busy && <p className={"text-sm "+sub}>Working…</p>}
          {err && <p className="text-sm text-rose-500">{err}</p>}
          {out && <div><pre className="whitespace-pre-wrap rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-800 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100">{out}</pre>
            <div className="mt-2 flex gap-2">
              <button onClick={()=>navigator.clipboard&&navigator.clipboard.writeText(out)} className="rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Copy</button>
              {mode!=="fit" && <button onClick={()=>onSaveNote(out)} className="rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-medium hover:bg-slate-100 focus:outline-none focus:ring-2 focus:ring-teal-500 dark:border-slate-600 dark:hover:bg-slate-700">Save to notes</button>}
            </div></div>}
        </div>
      </div>
    </div>
  );
}

// ---------------- Settings ----------------
function SettingsTab({ settings, setSettings, jobs }) {
  const sub="text-slate-500 dark:text-slate-400"; const set=k=>e=>setSettings(s=>({...s,[k]:e.target.value}));
  const exportData=()=>{ const blob=new Blob([JSON.stringify(jobs,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="tracked-jobs.json"; a.click(); };
  return (
    <div className="mt-6 space-y-5">
      <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4 sm:p-5">
        <h2 className="text-sm font-semibold uppercase tracking-wide">AI backend (your Apps Script web app)</h2>
        <p className={"mt-1 text-sm "+sub}>Deploy JobScannerBackend.gs as a Web App, then paste its URL here. Your Gemini key stays on Google's servers; the token is a shared secret you also set in Script Properties.</p>
        <div className="mt-3 grid grid-cols-1 gap-3">
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Web app URL</span><input value={settings.backendUrl} onChange={set("backendUrl")} placeholder="https://script.google.com/macros/s/…/exec" className={inputCls}/></label>
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Access token</span><input value={settings.token} onChange={set("token")} className={inputCls}/></label>
        </div>
      </div>
      <div className="rounded-xl border bg-white border-slate-200 dark:bg-slate-800 dark:border-slate-700 p-4 sm:p-5">
        <h2 className="text-sm font-semibold uppercase tracking-wide">Profile</h2>
        <div className="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Alert email</span><input value={settings.email} onChange={set("email")} className={inputCls}/></label>
          <label className="flex flex-col gap-1 text-sm"><span className={sub}>Home base</span><input value={settings.homeBase} onChange={set("homeBase")} className={inputCls}/></label>
        </div>
        <label className="mt-3 flex flex-col gap-1 text-sm"><span className={sub}>CV summary — drives AI fit & tailoring</span><textarea value={settings.cv} onChange={set("cv")} rows={10} className={inputCls}/></label>
      </div>
      <div className="rounded-xl border border-amber-300 bg-amber-50 p-4 dark:border-amber-800 dark:bg-amber-950 sm:p-5">
        <h2 className="text-sm font-semibold uppercase tracking-wide text-amber-800 dark:text-amber-200">About your data</h2>
        <ul className="mt-2 list-disc space-y-1 pl-5 text-sm text-amber-900 dark:text-amber-100">
          <li>Tracked roles are saved in <span className="font-medium">this browser only</span> (localStorage) — they do not sync between your phone and laptop. Use Export to back them up or move them.</li>
          <li>Keep the web-app URL + token private; anyone with both can use your Gemini quota.</li>
        </ul>
        <button onClick={exportData} className="mt-3 rounded-lg border border-amber-400 px-3 py-1.5 text-sm font-medium text-amber-900 hover:bg-amber-100 focus:outline-none focus:ring-2 focus:ring-amber-500 dark:border-amber-700 dark:text-amber-100 dark:hover:bg-amber-900">Export tracked jobs (.json)</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
